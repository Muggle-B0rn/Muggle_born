<!DOCTYPE html>
<html lang="en">
<head>
    <title>log in</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="log_in_sign_up.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="body"> 
    <div class="div">
         <nav>
            <div>
                <ul>
                    <li><a href="sign_up.html">Sign_Up</a></li>
                    <li><a href="log_in.html">Log_In</a></li>
                    <li><a href="Password Generator/index.html">Password Generator</a></li>
                    <li><a href="index.html">Get Your Sale</a></li>
                    <li><a href="XO/index.html">Game</a></li>
                </ul>
            </div>
        </nav>
        <h1>Welcome Back!</h1>
        <form class="form">
            <label class="Email">Email</label>
            <input type="email" name="email" required placeholder="Email" 
                oninvalid="this.setCustomValidity('Enter a valid email (must contain @)')"
                oninput="this.setCustomValidity('')" />

            <label class="Password">Password</label>
           <div class="password-box">
    <input type="password" name="password" id="password" required placeholder="Password" 
        oninvalid="this.setCustomValidity('Please enter your password')"
        oninput="this.setCustomValidity('')" />
    <div class="icon">
        <button type="button" class="eye-btn" id="togglePassword">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
        </button>
    </div>
</div>
<br>
            <input class="button" type="submit" value="log in">
            <h4 class="sign_up">Don't have an account? <a href="sign_up.html">Sign up</a></h4>
        </form>
    </div>

    <script>
       document.querySelector('.form').addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.querySelector('input[name="email"]').value;
            const password = document.querySelector('input[name="password"]').value;

            if (localStorage.getItem("uemail") === email && localStorage.getItem("upassword") === password) {
                alert(`Welcome Back!`);
            } else {
                alert(`Email or password is incorrect. Please try again.`);
            }
        });
        const togglePassword = document.querySelector("#togglePassword");
        const passwordField = document.querySelector("#password");
        const eyeIcon = document.querySelector("#eyeIcon");

        togglePassword.addEventListener("click", function () {
            const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
            passwordField.setAttribute("type", type);
            
            eyeIcon.classList.toggle("fa-eye");
            eyeIcon.classList.toggle("fa-eye-slash");
        });
    </script>
</body>
</html>
