            <h1>Password Generator</h1>
            <form action="">
                <div class="checkboxes">
                <label for="Symbols"><input type="checkbox" id="Symbols" name="Symbols" >Symbols
                </label>
                <label for="Numbers"><input type="checkbox" id="Numbers" name="Numbers">Numbers
                </label>
                <label for="Lowercase"><input type="checkbox" id="Lowercase" name="Lowercase">Lowercase
                </label>
                <label for="Uppercase"><input type="checkbox" id="Uppercase" name="Uppercase">Uppercase
                </label>
                </div>
                <div class="lengthInput">
                <label for="lengthInput">Length:
                <input type="range" class="lengthInput" id="lengthInput" min="6" max="100" value="6">
                <span id="rlength">6</span>
                </label>
                </div>
                <div class="button">
                <input type="button"class="generate-btn" value="Generate"></div>

                <div class="password-box">
                <input type="text" class="password" id ="password" readonly placeholder="Password">
                <div class="icon">
                <button type="button" class="copy-btn">
                    <div class="copy">
                <i class="fa-regular fa-copy"></i>
                </div>
                <div class="copied">
                <i class="fa-solid fa-copy"></i>
                </div>
                </button>
                </div>
                </div>
                

                
            </form>

        </div>
